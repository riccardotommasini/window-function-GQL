name: build

on:
  push:
    branches:
      - 2025.x
    paths-ignore:
      - 'README.md'
      - 'services/playground/**'
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'services/playground/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 'Set up JDK'
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: 'Cache Maven packages'
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}-${{ github.sha }}

      - name: 'Checkout'
        uses: actions/checkout@v3

      - name: 'Clean and verify'
        working-directory: services/neo4j
        run: ./mvnw --no-transfer-progress clean verify
