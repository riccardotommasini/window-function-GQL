services:
  neo:
    build:
      context: ./services/neo4j
    platform: ${NEO4J_PLATFORM:-linux/arm64/v8}
    ports:
      - 7474:7474
      - 7687:7687
    restart: always
    environment:
      NEO4J_AUTH: none
    healthcheck:
      test:
        - CMD-SHELL
        - cypher-shell -a bolt://localhost:7687 "RETURN 1;" >/dev/null 2>&1
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    volumes:
      - ./services/neo4j/data:/data

  playground:
    build:
      context: ./services/playground
    platform: ${PLAYGROUND_PLATFORM:-linux/arm64/v8}
    ports:
      - 5174:5174
    environment:
      PLAYGROUND_PORT: 5174
      NEO4J_URI: bolt://neo:7687
      PLAYGROUND_EXAMPLES_FILE: /app/examples.yaml
    volumes:
      - ./services/neo4j/examples:/neo4j/examples:ro
      - ./services/playground/examples.yaml:/app/examples.yaml:ro
    depends_on:
      neo:
        condition: service_healthy
